name: Release Binaries

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail

          mkdir -p dist

          binary_name="fp-curl"
          if [ "${GOOS}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          asset_base="fp-curl_${{ github.event.release.tag_name }}_${GOOS}_${GOARCH}"
          package_dir="dist/${asset_base}"
          mkdir -p "${package_dir}"

          go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" .

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -r "${asset_base}.zip" "${asset_base}"
            )
            echo "ASSET_PATH=dist/${asset_base}.zip" >> "${GITHUB_ENV}"
          else
            tar -C dist -czf "dist/${asset_base}.tar.gz" "${asset_base}"
            echo "ASSET_PATH=dist/${asset_base}.tar.gz" >> "${GITHUB_ENV}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}
